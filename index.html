<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Vinayaka Spices</title>
    <style>

        h1 { color: #d35400; text-transform: uppercase; margin-bottom: 30px; }
        .catalog { max-width: 450px; margin: auto; }

        .whatsapp-btn { background-color: #25D366; }
        .sms-btn { background-color: #007AFF; }
        .support-section { margin-top: 50px; padding: 20px; background: #f2f2f2; border-radius: 10px; font-size: 0.9em; border: 1px dashed #ccc; }
        .support-link { color: #d35400; font-weight: bold; text-decoration: none; }
        hr { border: 0; height: 1px; background: #ccc; margin: 40px 0; }
    </style>
</head>
<body>
